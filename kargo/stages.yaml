            value: ${{ imageFrom("docker.io/18bit048/kargo-repo").Tag }}
      - uses: git-commit
        as: commit
        config:
          path: ./repo
          message: "chore(staging): promote to staging"
      - uses: git-push
        config:
          path: ./repo
      - uses: argocd-update
        config:
