apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: dev
  namespace: kargo-demo
spec:
  requestedFreight:
  - origin:
      kind: Warehouse
      name: kargo-demo
    sources:
      direct: true
  promotionTemplate:
    spec:
      steps:
      - uses: git-clone
        config:
          repoURL: https://github.com/shilash-aivar/kargo-gitops.git
          checkout:
          - branch: main
            path: ./repo
      - uses: yaml-update
        as: update-image
        config:
          path: repo/env/dev/values.yaml
          updates:
          - key: image.tag
            value: ${{ imageFrom("docker.io/18bit048/kargo-repo").Tag }}
      - uses: git-commit
        as: commit
        config:
          path: ./repo
          message: "chore(dev): promote to dev"
      - uses: git-push
        config:
          path: ./repo
      - uses: argocd-update
        config:
          apps:
          - name: kargo-demo-dev
            sources:
            - repoURL: https://github.com/shilash-aivar/kargo-gitops.git
              desiredCommitFromStep: commit
---
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: staging
  namespace: kargo-demo
spec:
  requestedFreight:
  - origin:
      kind: Warehouse
      name: kargo-demo
    sources:
      stages:
      - dev
  promotionTemplate:
    spec:
      steps:
      - uses: git-clone
