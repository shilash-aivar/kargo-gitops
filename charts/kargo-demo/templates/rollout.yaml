{{- if .Values.rollout.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ include "kargo-demo.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kargo-demo.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "kargo-demo.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kargo-demo.selectorLabels" . | nindent 8 }}
    spec:
      containers:
      - name: {{ .Chart.Name }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.service.targetPort }}
        env:
        - name: APP_ENV
          value: {{ .Values.env.APP_ENV | quote }}
        - name: APP_VERSION
          value: {{ .Values.env.APP_VERSION | quote }}
        livenessProbe:
          httpGet:
            path: /healthz
            port: {{ .Values.service.targetPort }}
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /healthz
            port: {{ .Values.service.targetPort }}
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
  strategy:
    {{- if eq .Values.rollout.strategy "canary" }}
    canary:
      steps:
      - setWeight: 20
      - pause: { duration: 30s }
      - setWeight: 50
      - pause: { duration: 30s }
      - setWeight: 100
    {{- else if eq .Values.rollout.strategy "blueGreen" }}
    blueGreen:
      activeService: {{ include "kargo-demo.fullname" . }}
      previewService: {{ include "kargo-demo.fullname" . }}-preview
      autoPromotionEnabled: false
    {{- end }}
{{- end }}
