apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kargo-convogent-demo-stage
  namespace: default
  annotations:
    kargo.akuity.io/authorized-stage: kargo-convogent-demo:convogent-demo-stage
spec:
  project: default
  source:
    repoURL: https://github.com/shilash-aivar/kargo-gitops.git
    targetRevision: main
    path: charts/kargo-demo
    helm:
      valueFiles:
      - ../../env/convogent-like-stage/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: kargo-convogent-demo-stage
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
